<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Calculator - Fincalc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .premium-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
        }
        .dark .premium-card {
            background: rgba(24, 24, 27, 0.5);
        }
        .input-glass {
            background: rgba(15, 23, 42, 0.03);
            border: 1px solid rgba(15, 23, 42, 0.05);
            transition: all 0.3s;
        }
        .dark .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .text-glow-orange {
            text-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
        }
        .mode-btn {
            flex: 1 1 0%;
            padding: 0.75rem 0;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 0.75rem;
            transition: all 0.3s;
            color: #94a3b8;
        }
        .mode-btn.active {
            background-color: #ea580c;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.3);
        }
    </style>
</head>
<body class="transition-colors duration-300 bg-slate-50 dark:bg-[#060606] text-slate-900 dark:text-white min-h-screen pb-12 font-sans overflow-x-hidden">
    <!-- Background Accents -->
    <div class="fixed top-0 right-0 w-[60%] h-[40%] bg-orange-600/10 blur-[120px] -z-10 rounded-full"></div>
    <div class="fixed bottom-0 left-0 w-[40%] h-[30%] bg-blue-600/10 blur-[120px] -z-10 rounded-full"></div>

    <div class="max-w-[480px] mx-auto p-6 flex flex-col gap-8">
        <!-- Header -->
        <header class="flex items-center justify-between py-2">
            <a href="/index.html" class="w-12 h-12 rounded-2xl bg-white dark:bg-zinc-800 border border-slate-200 dark:border-white/5 flex items-center justify-center shadow-lg active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </a>
            <div class="text-center">
                <h1 class="font-display font-black text-xl tracking-tight leading-none text-orange-600 dark:text-orange-500">GSTPRO</h1>
                <p class="text-[9px] font-bold uppercase tracking-[0.3em] opacity-40 mt-1">Tax Analysis</p>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-white dark:bg-zinc-800 border border-slate-200 dark:border-white/5 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
        </header>

        <!-- Visualization Hub -->
        <div class="premium-card p-10 flex flex-col items-center bg-white dark:bg-zinc-900/40 shadow-2xl relative">
            <div class="relative w-48 h-48 mb-8">
                <canvas id="gstChart"></canvas>
            </div>
            
            <div class="text-center">
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-orange-500 mb-2">Total Amount (Incl. Tax)</p>
                <p id="totalVal" class="text-5xl font-display font-black text-glow-orange text-slate-900 dark:text-white">₹ 0</p>
            </div>
        </div>

        <!-- Breakdown Section -->
        <div class="grid grid-cols-2 gap-4">
            <div class="premium-card p-8 text-center border-l-4 border-l-slate-300 dark:border-l-zinc-700">
                <p class="text-[9px] font-bold uppercase tracking-widest text-slate-400 mb-2">Net Base Price</p>
                <p id="netAmountRes" class="text-xl font-display font-black text-slate-900 dark:text-white">₹ 0</p>
            </div>
            <div class="premium-card p-8 text-center border-l-4 border-l-orange-500">
                <p class="text-[9px] font-bold uppercase tracking-widest text-slate-400 mb-2">GST Tax Payable</p>
                <p id="gstAmountRes" class="text-xl font-display font-black text-orange-500">₹ 0</p>
            </div>
        </div>

        <!-- Inputs Engine -->
        <div class="premium-card p-8 bg-white/60 dark:bg-zinc-900/60 shadow-xl space-y-8">
            <!-- Mode Switch -->
            <div class="flex input-glass p-1.5 rounded-2xl">
                <button id="addGstBtn" onclick="toggleGstMode(true)" class="mode-btn active">Addition (+)</button>
                <button id="remGstBtn" onclick="toggleGstMode(false)" class="mode-btn">Removal (-)</button>
            </div>

            <div class="space-y-4">
                <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 px-2">Base Amount (₹)</label>
                <input type="number" id="baseAmount" value="1000" oninput="updateGST()"
                    class="w-full input-glass rounded-2xl px-6 py-5 font-display font-black text-3xl outline-none text-slate-900 dark:text-white">
            </div>

            <div class="space-y-6">
                <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 px-2">Select GST Slab (%)</label>
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="setGstRate(5)" class="py-3 input-glass rounded-xl text-[10px] font-black hover:bg-orange-500/10 transition-all">5%</button>
                    <button onclick="setGstRate(12)" class="py-3 input-glass rounded-xl text-[10px] font-black hover:bg-orange-500/10 transition-all">12%</button>
                    <button onclick="setGstRate(18)" class="py-3 input-glass rounded-xl text-[10px] font-black border-orange-500/30 bg-orange-500/5 text-orange-600">18%</button>
                    <button onclick="setGstRate(28)" class="py-3 input-glass rounded-xl text-[10px] font-black hover:bg-orange-500/10 transition-all">28%</button>
                </div>
                <div class="relative">
                    <input type="number" id="gstRate" value="18" oninput="updateGST()"
                        class="w-full input-glass rounded-2xl px-6 py-4 font-display font-black text-xl outline-none">
                    <span class="absolute right-6 top-1/2 -translate-y-1/2 font-black text-slate-300 dark:text-zinc-600">%</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-6 mt-4">
            <button onclick="resetGST()" class="w-full max-w-[280px] py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-3xl font-display font-black text-sm uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-all">
                Clear Assessment
            </button>
            <div class="text-center opacity-30">
                <p class="text-[9px] font-black tracking-[0.3em] uppercase">Tax Compliance Engine</p>
            </div>
        </div>
    </div>

    <script src="/gst.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        
        // Enhance toggle UI
        const originalToggle = window.toggleGstMode;
        window.toggleGstMode = function(isAdd) {
            originalToggle(isAdd);
            document.getElementById('addGstBtn').classList.toggle('active', isAdd);
            document.getElementById('remGstBtn').classList.toggle('active', !isAdd);
        };
        
        // Enhance slab UI
        const originalSetRate = window.setGstRate;
        window.setGstRate = function(rate) {
            originalSetRate(rate);
            document.querySelectorAll('button[onclick^="setGstRate"]').forEach(btn => {
                const btnRate = btn.getAttribute('onclick').match(/\d+/)[0];
                if(btnRate == rate) {
                    btn.className = "py-3 input-glass rounded-xl text-[10px] font-black border-orange-500/30 bg-orange-500/5 text-orange-600 ring-2 ring-orange-500/10";
                } else {
                    btn.className = "py-3 input-glass rounded-xl text-[10px] font-black hover:bg-orange-500/10 transition-all";
                }
            });
        };
    </script>
</body>
</html>
