<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Calculator - Fincalc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .premium-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
        }
        .dark .premium-card {
            background: rgba(24, 24, 27, 0.5);
        }
        .input-glass {
            background: rgba(15, 23, 42, 0.03);
            border: 1px solid rgba(15, 23, 42, 0.05);
            transition: all 0.3s;
        }
        .dark .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .text-glow-emerald {
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body class="transition-colors duration-300 bg-slate-50 dark:bg-[#060606] text-slate-900 dark:text-white min-h-screen pb-12 font-sans overflow-x-hidden">
    <!-- Background Accents -->
    <div class="fixed top-0 right-0 w-[60%] h-[40%] bg-emerald-600/10 blur-[120px] -z-10 rounded-full"></div>
    <div class="fixed bottom-0 left-0 w-[40%] h-[30%] bg-blue-600/10 blur-[120px] -z-10 rounded-full"></div>

    <div class="max-w-[480px] mx-auto p-6 flex flex-col gap-8">
        <!-- Header -->
        <header class="flex items-center justify-between py-2">
            <a href="/index.html" class="w-12 h-12 rounded-2xl bg-white dark:bg-zinc-800 border border-slate-200 dark:border-white/5 flex items-center justify-center shadow-lg active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </a>
            <div class="text-center">
                <h1 class="font-display font-black text-xl tracking-tight leading-none text-emerald-600 dark:text-emerald-500">SAVINGS</h1>
                <p class="text-[9px] font-bold uppercase tracking-[0.3em] opacity-40 mt-1">Discount Calc</p>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-white dark:bg-zinc-800 border border-slate-200 dark:border-white/5 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 5 12 10 7"/><line x1="15" x2="5" y1="12" y2="12"/></svg>
            </div>
        </header>

        <!-- Donut Visualization -->
        <div class="premium-card p-10 flex flex-col items-center bg-white dark:bg-zinc-900/40 shadow-2xl">
            <div class="relative w-48 h-48 mb-8">
                <canvas id="discountChart"></canvas>
            </div>
            
            <div class="text-center">
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-emerald-500 mb-2">Final Payable Amount</p>
                <p id="finalPrice" class="text-5xl font-display font-black text-glow-emerald text-slate-900 dark:text-white">₹ 0</p>
            </div>
        </div>

        <!-- Breakdown Section -->
        <div class="grid grid-cols-2 gap-4">
            <div class="premium-card p-6 text-center border-l-4 border-l-slate-300 dark:border-l-zinc-700">
                <p class="text-[9px] font-bold uppercase tracking-widest text-slate-400 mb-2">Original List Price</p>
                <p id="originalPriceRes" class="text-xl font-display font-black text-slate-900 dark:text-white">₹ 0</p>
            </div>
            <div class="premium-card p-6 text-center border-l-4 border-l-emerald-500">
                <p class="text-[9px] font-bold uppercase tracking-widest text-slate-400 mb-2">Total Discount Value</p>
                <p id="savingsRes" class="text-xl font-display font-black text-emerald-500">₹ 0</p>
            </div>
        </div>

        <!-- Inputs Section -->
        <div class="premium-card p-8 space-y-8 bg-white/60 dark:bg-zinc-900/60 shadow-xl">
            <div class="space-y-4">
                <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 px-2">Original Price (₹)</label>
                <input type="number" id="basePrice" value="5000" oninput="updateDiscount()"
                    class="w-full input-glass rounded-2xl px-6 py-5 font-display font-black text-3xl outline-none text-slate-900 dark:text-white">
            </div>

            <div class="space-y-4">
                <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 px-2">Discount Percentage (%)</label>
                <div class="relative">
                    <input type="number" id="discountPercent" value="20" oninput="updateDiscount()"
                        class="w-full input-glass rounded-2xl px-6 py-5 font-display font-black text-3xl outline-none text-emerald-500">
                    <span class="absolute right-6 top-1/2 -translate-y-1/2 font-black text-emerald-500/50 text-2xl">%</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-6 mt-4">
            <button onclick="resetDiscount()" class="w-full max-w-[280px] py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-3xl font-display font-black text-sm uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-all">
                Clear Calculation
            </button>
            <div class="text-center opacity-30">
                <p class="text-[9px] font-black tracking-[0.3em] uppercase">Smart Deals Intelligence</p>
            </div>
        </div>
    </div>

    <script src="/discount.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
</body>
</html>
