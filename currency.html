<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter - Fincalc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .premium-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
        }
        .dark .premium-card {
            background: rgba(24, 24, 27, 0.5);
        }
        .input-glass {
            background: rgba(15, 23, 42, 0.03);
            border: 1px solid rgba(15, 23, 42, 0.05);
            transition: all 0.3s;
        }
        .dark .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .flag-ring {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="transition-colors duration-300 bg-slate-50 dark:bg-[#060606] text-slate-900 dark:text-white min-h-screen pb-12 font-sans overflow-x-hidden">
    <!-- Background Accents -->
    <div class="fixed top-0 right-0 w-[60%] h-[40%] bg-blue-600/10 blur-[120px] -z-10 rounded-full"></div>
    <div class="fixed bottom-0 left-0 w-[40%] h-[30%] bg-indigo-600/10 blur-[120px] -z-10 rounded-full"></div>

    <div class="max-w-[480px] mx-auto p-6 flex flex-col gap-8">
        <!-- Header -->
        <header class="flex items-center justify-between py-2">
            <a href="/index.html" class="w-12 h-12 rounded-2xl bg-white dark:bg-zinc-800 border border-slate-200 dark:border-white/5 flex items-center justify-center shadow-lg active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </a>
            <div class="text-center">
                <h1 class="font-display font-black text-xl tracking-tight leading-none text-blue-600 dark:text-blue-500">FXPRO</h1>
                <p class="text-[9px] font-bold uppercase tracking-[0.3em] opacity-40 mt-1">Live Exchange</p>
            </div>
            <button onclick="fetchRates()" class="w-12 h-12 rounded-2xl bg-white dark:bg-zinc-800 border border-slate-200 dark:border-white/5 flex items-center justify-center shadow-lg active:rotate-180 transition-all duration-500">
                <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
            </button>
        </header>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="fixed inset-0 bg-white/80 dark:bg-black/80 backdrop-blur-md z-50 flex flex-col items-center justify-center transition-opacity duration-500">
            <div class="w-16 h-16 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-6 shadow-2xl"></div>
            <p class="text-xs font-black uppercase tracking-[0.4em] opacity-60">Syncing Markets...</p>
        </div>

        <!-- Main Conversion Engine -->
        <div class="premium-card p-8 bg-white/60 dark:bg-zinc-900/60 shadow-xl space-y-10 relative">
            <!-- Sell Section -->
            <div class="space-y-4">
                <div class="flex items-center justify-between px-2">
                    <div class="flex items-center gap-3">
                        <div id="fromFlag" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-white/10 flex items-center justify-center font-black text-xs flag-ring">USD</div>
                        <select id="fromCurrency" onchange="updateUIFlags(); convert('from')" 
                            class="bg-transparent font-display font-black text-lg tracking-widest uppercase outline-none"></select>
                    </div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Source</label>
                </div>
                <input type="number" id="fromAmount" value="1" oninput="convert('from')"
                    class="w-full input-glass rounded-2xl px-6 py-6 font-display font-black text-4xl outline-none text-slate-900 dark:text-white">
            </div>

            <!-- Pivot Button -->
            <div class="flex justify-center -my-12 relative z-10">
                <button onclick="swapCurrencies()" class="w-14 h-14 rounded-full bg-white dark:bg-zinc-800 border-8 border-slate-50 dark:border-[#060606] flex items-center justify-center shadow-2xl text-blue-500 active:rotate-180 transition-all duration-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                </button>
            </div>

            <!-- Buy Section -->
            <div class="space-y-4">
                <div class="flex items-center justify-between px-2">
                    <div class="flex items-center gap-3">
                        <div id="toFlag" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-white/10 flex items-center justify-center font-black text-xs flag-ring">INR</div>
                        <select id="toCurrency" onchange="updateUIFlags(); convert('from')" 
                            class="bg-transparent font-display font-black text-lg tracking-widest uppercase outline-none"></select>
                    </div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Target</label>
                </div>
                <input type="number" id="toAmount" oninput="convert('to')"
                    class="w-full input-glass rounded-2xl px-6 py-6 font-display font-black text-4xl outline-none text-blue-600 dark:text-blue-500">
            </div>
        </div>

        <!-- Meta Info Card -->
        <div class="premium-card p-6 flex flex-col items-center gap-2 bg-white/40 dark:bg-blue-500/5 shadow-xl border-blue-500/10">
            <div class="flex items-center gap-3 text-blue-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                <p id="exchangeRateText" class="text-sm font-display font-black tracking-tight">1 USD = 83.25 INR</p>
            </div>
            <p id="updatedAt" class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-400 opacity-60 mt-1">Live data Syncing...</p>
        </div>

        <div class="text-center opacity-30 mt-4">
            <p class="text-[9px] font-black tracking-[0.3em] uppercase">Market Aggregation Engine</p>
        </div>
    </div>

    <script src="/currency.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
</body>
</html>
